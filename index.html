<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lunatic Community</title>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET Y ESTILOS GLOBALES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0b1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Fondo espacial con blur y puntos */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #1a1040, #0b0b1a 70%);
            z-index: -2;
            overflow: hidden;
        }

        .space-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.2), transparent),
                radial-gradient(3px 3px at 60% 20%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.2), transparent),
                radial-gradient(4px 4px at 10% 90%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 90% 10%, rgba(255,255,255,0.2), transparent),
                radial-gradient(3px 3px at 50% 50%, rgba(255,255,255,0.5), transparent);
            background-size: 200px 200px;
            animation: twinkle 4s ease-in-out infinite alternate;
            filter: blur(1px);
        }

        @keyframes twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .space-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background: rgba(11, 11, 26, 0.3);
            z-index: -1;
        }

        /* Puntos morados y blancos flotantes */
        .dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            background: rgba(160, 100, 255, 0.15);
            box-shadow: 0 0 20px rgba(160, 100, 255, 0.1);
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(20, 18, 40, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid rgba(160, 100, 255, 0.25);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            color: #f0f0ff;
            position: relative;
            z-index: 10;
            transition: all 0.3s;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(160, 100, 255, 0.2);
            padding-bottom: 20px;
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b380ff, #7a4bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .logo span {
            font-size: 0.9rem;
            color: #a88bff;
            -webkit-text-fill-color: #a88bff;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-area input {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(160, 100, 255, 0.3);
            padding: 10px 16px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
            min-width: 150px;
        }

        .user-area input:focus {
            border-color: #a070ff;
            box-shadow: 0 0 20px rgba(160, 100, 255, 0.15);
        }

        .user-area input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
            background: rgba(160, 100, 255, 0.2);
            color: #d4c0ff;
            border: 1px solid rgba(160, 100, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(160, 100, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #a070ff, #7a4bff);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #b080ff, #8a5bff);
        }

        .btn-success {
            background: #2ecc71;
            color: #fff;
            border: none;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .btn-warning {
            background: #f39c12;
            color: #fff;
            border: none;
        }

        .btn-warning:hover {
            background: #e67e22;
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
            border: none;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #ddd;
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }

        /* ===== SECCIONES ===== */
        .section {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== PANEL ADMIN (subir archivos) ===== */
        .admin-panel {
            background: rgba(0,0,0,0.25);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            border: 1px solid rgba(160, 100, 255, 0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #c8b8ff;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(160, 100, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #a070ff;
            box-shadow: 0 0 20px rgba(160, 100, 255, 0.1);
        }

        .form-group select option {
            background: #1a1040;
        }

        .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 200px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        /* ===== CATEGORÍAS ===== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .category-card {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(160, 100, 255, 0.15);
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: #a070ff;
            box-shadow: 0 10px 30px rgba(160, 100, 255, 0.15);
        }

        .category-card i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #a070ff;
        }

        .category-card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .category-card p {
            font-size: 0.85rem;
            color: #a090c0;
        }

        .category-card .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            background: rgba(160, 100, 255, 0.2);
            color: #c8b8ff;
        }

        .category-card .badge.vip { background: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .category-card .badge.super { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .category-card .badge.mega { background: rgba(155, 89, 182, 0.2); color: #9b59b6; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1640;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(160, 100, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #d4c0ff;
        }

        .modal .close-modal {
            float: right;
            background: none;
            border: none;
            color: #a090c0;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .modal .close-modal:hover {
            color: #fff;
        }

        .modal .form-group {
            margin-bottom: 15px;
        }

        .modal .form-group label {
            color: #b8a8e0;
        }

        .password-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px 16px;
            border-radius: 12px;
            margin-top: 8px;
        }

        .password-display input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .password-display button {
            background: none;
            border: none;
            color: #a070ff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .password-display button:hover {
            color: #c8b8ff;
        }

        /* ===== LISTA DE ARCHIVOS ===== */
        .file-list {
            margin-top: 20px;
        }

        .file-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid #a070ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .file-item .file-info {
            flex: 1;
        }

        .file-item .file-info h4 {
            font-size: 1.1rem;
            color: #e0d0ff;
        }

        .file-item .file-info p {
            font-size: 0.9rem;
            color: #a090c0;
            margin-top: 4px;
        }

        .file-item .file-info .meta {
            font-size: 0.75rem;
            color: #7a6a9a;
            margin-top: 6px;
        }

        .file-item .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-item .file-actions a {
            color: #a070ff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .file-item .file-actions a:hover {
            color: #c8b8ff;
        }

        .file-item.draft {
            border-left-color: #f39c12;
            opacity: 0.7;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(160, 100, 255, 0.1);
            padding-bottom: 12px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #a090c0;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .tab-btn:hover {
            color: #d4c0ff;
            background: rgba(160, 100, 255, 0.05);
        }

        .tab-btn.active {
            background: rgba(160, 100, 255, 0.15);
            color: #d4c0ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container { padding: 18px; }
            .header { flex-direction: column; align-items: stretch; }
            .user-area { flex-direction: column; }
            .user-area input { width: 100%; }
            .form-row { flex-direction: column; }
            .btn-group { flex-direction: column; }
            .categories-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .categories-grid { grid-template-columns: 1fr; }
            .logo h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<!-- FONDO ESPACIAL -->
<div class="space-bg"></div>
<div class="dots" id="dotsContainer"></div>

<!-- ===== CONTENEDOR PRINCIPAL ===== -->
<div class="container" id="app">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <h1>🌙 Lunatic Community</h1>
            <span>by Key1.9Uml$</span>
        </div>
        <div class="user-area" id="userArea">
            <input type="text" id="loginUser" placeholder="Nombre de Discord" />
            <input type="password" id="loginPass" placeholder="Contraseña" />
            <button class="btn btn-primary" onclick="login()">Iniciar Sesión</button>
            <button class="btn btn-outline" onclick="register()">Registrarse</button>
            <button class="btn btn-danger" onclick="logout()" id="logoutBtn" style="display:none;">Cerrar Sesión</button>
        </div>
    </header>

    <!-- ===== SECCIÓN PRINCIPAL ===== -->
    <div id="mainSection">

        <!-- Panel Admin (solo visible cuando se inicia sesión con Key1.9Uml$) -->
        <div id="adminPanel" class="section active">
            <div class="admin-panel">
                <h2 style="margin-bottom:20px; color:#d4c0ff;"><i class="fas fa-cloud-upload-alt"></i> Subir Archivo</h2>
                <div class="form-group">
                    <label>Archivo (URL o enlace de descarga)</label>
                    <input type="text" id="fileUrl" placeholder="https://ejemplo.com/archivo.zip" />
                </div>
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="fileTitle" placeholder="Mi recurso increíble" />
                </div>
                <div class="form-group">
                    <label>Descripción (Markdown soportado)</label>
                    <textarea id="fileDesc" placeholder="**Descripción** con *Markdown*"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Imagen (URL - opcional)</label>

                    </div>
                    <div class="form-group">
                        <label>VirusTotal (URL - opcional)</label>
                        <input type="text" id="fileVT" placeholder="https://virustotal.com/..." />

                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="showUploadOptions()"><i class="fas fa-upload"></i> Subir</button>
                    <button class="btn btn-warning" onclick="saveDraft()"><i class="fas fa-save"></i> Guardar Borrador</button>
                </div>
                <div id="uploadOptions" style="margin-top:15px; display:none; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px;">
                    <p style="margin-bottom:10px; color:#c8b8ff;">¿A dónde lo quieres subir?</p>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn btn-outline" onclick="uploadFile('gratis')">Gratis</button>
                        <button class="btn btn-outline" onclick="uploadFile('vip')" style="border-color:#f1c40f; color:#f1c40f;">VIP</button>
                        <button class="btn btn-outline" onclick="uploadFile('supervip')" style="border-color:#e74c3c; color:#e74c3c;">Super VIP</button>
                        <button class="btn btn-outline" onclick="uploadFile('megavip')" style="border-color:#9b59b6; color:#9b59b6;">Mega VIP</button>
                    </div>
                </div>
            </div>

            <!-- Botón generar contraseña VIP (solo admin) -->
            <div style="margin: 25px 0; text-align:center;">
                <button class="btn btn-primary" onclick="showGeneratePassword()"><i class="fas fa-key"></i> Generar Contraseña VIP</button>
            </div>

            <!-- Tabs de categorías -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tabPublic" onclick="switchTab('tabPublic')">📁 Público</button>
                <button class="tab-btn" data-tab="tabVIP" onclick="switchTab('tabVIP')">⭐ VIP</button>
                <button class="tab-btn" data-tab="tabSuperVIP" onclick="switchTab('tabSuperVIP')">🔥 Super VIP</button>
                <button class="tab-btn" data-tab="tabMegaVIP" onclick="switchTab('tabMegaVIP')">💎 Mega VIP</button>
                <button class="tab-btn" data-tab="tabDrafts" onclick="switchTab('tabDrafts')">📝 Borradores</button>
            </div>

            <div id="tabPublic" class="tab-content active">
                <h3>Archivos Públicos</h3>
                <div id="publicFiles" class="file-list"></div>
            </div>
            <div id="tabVIP" class="tab-content">
                <h3>Archivos VIP <span style="font-size:0.8rem; color:#f1c40f;">(requiere contraseña)</span></h3>
                <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                    <input type="password" id="vipPass" placeholder="Contraseña VIP" style="background:rgba(255,255,255,0.06); border:1px solid rgba(160,100,255,0.2); padding:8px 14px; border-radius:10px; color:#fff;" />
                    <button class="btn btn-outline" onclick="unlockCategory('vip')">Desbloquear</button>
                </div>
                <div id="vipFiles" class="file-list"></div>
            </div>
            <div id="tabSuperVIP" class="tab-content">
                <h3>Archivos Super VIP <span style="font-size:0.8rem; color:#e74c3c;">(requiere contraseña)</span></h3>
                <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                    <input type="password" id="superVipPass" placeholder="Contraseña Super VIP" style="background:rgba(255,255,255,0.06); border:1px solid rgba(160,100,255,0.2); padding:8px 14px; border-radius:10px; color:#fff;" />
                    <button class="btn btn-outline" onclick="unlockCategory('supervip')">Desbloquear</button>
                </div>
                <div id="superVipFiles" class="file-list"></div>
            </div>
            <div id="tabMegaVIP" class="tab-content">
                <h3>Archivos Mega VIP <span style="font-size:0.8rem; color:#9b59b6;">(requiere contraseña)</span></h3>
                <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                    <input type="password" id="megaVipPass" placeholder="Contraseña Mega VIP" style="background:rgba(255,255,255,0.06); border:1px solid rgba(160,100,255,0.2); padding:8px 14px; border-radius:10px; color:#fff;" />
                    <button class="btn btn-outline" onclick="unlockCategory('megavip')">Desbloquear</button>
                </div>
                <div id="megaVipFiles" class="file-list"></div>
            </div>
            <div id="tabDrafts" class="tab-content">
                <h3>Borradores</h3>
                <div id="draftFiles" class="file-list"></div>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL GENERAR CONTRASEÑA ===== -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal">
        <button class="close-modal" onclick="closeModal('passwordModal')">&times;</button>
        <h2><i class="fas fa-key"></i> Generar Contraseña VIP</h2>
        <div class="form-group">
            <label>Categoría</label>
            <select id="genCategory">
                <option value="vip">VIP</option>
                <option value="supervip">Super VIP</option>
                <option value="megavip">Mega VIP</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nombre (DC)</label>
            <input type="text" id="genUserDC" placeholder="Usuario de Discord" />
        </div>
        <div class="form-group">
            <label>Contraseña generada</label>
            <div class="password-display">
                <input type="text" id="genPasswordDisplay" readonly placeholder="Presiona generar" />
                <button onclick="copyPassword()"><i class="fas fa-copy"></i></button>
            </div>
        </div>
        <button class="btn btn-primary" onclick="generateRandomPassword()"><i class="fas fa-sync-alt"></i> Generar contraseña aleatoriamente</button>
        <button class="btn btn-success" onclick="saveGeneratedPassword()" style="margin-top:10px;"><i class="fas fa-save"></i> Guardar contraseña</button>
    </div>
</div>

<script>
    // =============================================
    //  DATA (simulada en localStorage)
    // =============================================
    const ADMIN_USER = 'Key1.9Uml$';
    const ADMIN_PASS = 'Key2.82a$mc';

    // Claves de almacenamiento
    const STORAGE_FILES = 'lunatic_files';
    const STORAGE_PASSWORDS = 'lunatic_vip_passwords';
    const STORAGE_USERS = 'lunatic_users';

    // Estado global
    let currentUser = null;
    let unlocked = { vip: false, supervip: false, megavip: false };

    // =============================================
    //  INICIALIZACIÓN
    // =============================================
    document.addEventListener('DOMContentLoaded', () => {
        createDots();
        loadFiles();
        renderAllFiles();
        checkAdminSession();
        // Login con Enter
        document.getElementById('loginPass').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    });

    function createDots() {
        const container = document.getElementById('dotsContainer');
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const size = Math.random() * 6 + 2;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.background = Math.random() > 0.5 ? 'rgba(160,100,255,0.2)' : 'rgba(255,255,255,0.1)';
            dot.style.animation = `float ${Math.random() * 10 + 8}s ease-in-out infinite alternate`;
            dot.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(dot);
        }
        // Añadir keyframes de flotación
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
                100% { transform: translate(${Math.random()*60-30}px, ${Math.random()*60-30}px) scale(1.2); opacity: 0.8; }
            }
        `;
        document.head.appendChild(style);
    }

    // =============================================
    //  GESTIÓN DE USUARIOS
    // =============================================
    function getUsers() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_USERS)) || {};
        } catch { return {}; }
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
    }

    function register() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (!user || !pass) return alert('Completa todos los campos.');
        const users = getUsers();
        if (users[user]) return alert('Este usuario ya existe.');
        users[user] = pass;
        saveUsers(users);
        alert('Registro exitoso. Ahora inicia sesión.');
    }

    function login() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (!user || !pass) return alert('Completa todos los campos.');

        // Verificar si es el admin
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            currentUser = user;
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('adminPanel').classList.add('active');
            alert('Bienvenido, administrador.');
            renderAllFiles();
            return;
        }

        const users = getUsers();
        if (users[user] && users[user] === pass) {
            currentUser = user;
            document.getElementById('logoutBtn').style.display = 'inline-block';
            alert(`Bienvenido, ${user}.`);
            // Mostrar panel admin solo si es el admin (ya lo manejamos arriba)
            // Para usuarios normales, solo mostrar archivos (ya están visibles)
            renderAllFiles();
        } else {
            alert('Usuario o contraseña incorrectos.');
        }
    }

    function logout() {
        currentUser = null;
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('adminPanel').classList.remove('active');
        alert('Sesión cerrada.');
        renderAllFiles();
    }

    function checkAdminSession() {
        // Si ya hay sesión como admin (por si recarga)
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            currentUser = user;
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('adminPanel').classList.add('active');
            renderAllFiles();
        }
    }

    // =============================================
    //  GESTIÓN DE ARCHIVOS
    // =============================================
    function getFiles() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_FILES)) || [];
        } catch { return []; }
    }

    function saveFiles(files) {
        localStorage.setItem(STORAGE_FILES, JSON.stringify(files));
    }

    function loadFiles() {
        if (!localStorage.getItem(STORAGE_FILES)) {
            // Datos de ejemplo
            const sample = [
                { id: 1, title: 'Kit PvP Ultimate', desc: '**Kit completo** para PvP', image: '', vt: '', url: '#', category: 'gratis', draft: false, timestamp: Date.now() },
                { id: 2, title: 'Plugin AntiCheat Pro', desc: '*AntiCheat* avanzado', image: '', vt: '', url: '#', category: 'vip', draft: false, timestamp: Date.now() },
            ];
            saveFiles(sample);
        }
    }

    function addFile(fileData) {
        const files = getFiles();
        fileData.id = Date.now() + Math.random() * 1000;
        fileData.timestamp = Date.now();
        files.push(fileData);
        saveFiles(files);
        renderAllFiles();
    }

    function renderAllFiles() {
        renderPublicFiles();
        renderCategoryFiles('vip', 'vipFiles');
        renderCategoryFiles('supervip', 'superVipFiles');
        renderCategoryFiles('megavip', 'megaVipFiles');
        renderDrafts();
    }

    function renderPublicFiles() {
        const files = getFiles().filter(f => f.category === 'gratis' && !f.draft);
        const container = document.getElementById('publicFiles');
        if (!files.length) {
            container.innerHTML = '<p style="color:#7a6a9a;">No hay archivos públicos aún.</p>';
            return;
        }
        container.innerHTML = files.map(f => fileItemHTML(f)).join('');
    }

    function renderCategoryFiles(category, containerId) {
        const files = getFiles().filter(f => f.category === category && !f.draft);
        const container = document.getElementById(containerId);
        if (!files.length) {
            container.innerHTML = '<p style="color:#7a6a9a;">No hay archivos en esta categoría.</p>';
            return;
        }
        container.innerHTML = files.map(f => fileItemHTML(f)).join('');
    }

    function renderDrafts() {
        const files = getFiles().filter(f => f.draft === true);
        const container = document.getElementById('draftFiles');
        if (!files.length) {
            container.innerHTML = '<p style="color:#7a6a9a;">No hay borradores.</p>';
            return;
        }
        container.innerHTML = files.map(f => fileItemHTML(f, true)).join('');
    }

    function fileItemHTML(file, isDraft = false) {
        const desc = file.desc ? markdownToHTML(file.desc) : '';
        const img = file.image ? `<img src="${file.image}" style="max-width:60px; max-height:60px; border-radius:8px; margin-right:12px;" />` : '';
        const vt = file.vt ? `<a href="${file.vt}" target="_blank" style="color:#e74c3c;"><i class="fas fa-shield-alt"></i> VirusTotal</a>` : '';
        const draftClass = isDraft ? 'draft' : '';
        return `
            <div class="file-item ${draftClass}">
                <div class="file-info">
                    ${img}
                    <h4>${file.title}</h4>
                    <p>${desc}</p>
                    <div class="meta">${vt} ${file.category ? '· ' + file.category.toUpperCase() : ''}</div>
                </div>
                <div class="file-actions">
                    <a href="${file.url}" target="_blank"><i class="fas fa-download"></i> Descargar</a>
                    ${isDraft ? `<button class="btn btn-success" style="padding:4px 12px; font-size:0.7rem;" onclick="publishDraft(${file.id})">Publicar</button>` : ''}
                    ${isDraft ? `<button class="btn btn-danger" style="padding:4px 12px; font-size:0.7rem;" onclick="deleteFile(${file.id})">Eliminar</button>` : ''}
                </div>
            </div>
        `;
    }

    // =============================================
    //  SUBIR ARCHIVOS
    // =============================================
    function showUploadOptions() {
        const url = document.getElementById('fileUrl').value.trim();
        const title = document.getElementById('fileTitle').value.trim();
        const desc = document.getElementById('fileDesc').value.trim();
        if (!url || !title || !desc) {
            alert('Completa Archivo, Título y Descripción.');
            return;
        }
        document.getElementById('uploadOptions').style.display = 'block';
    }

    function uploadFile(category) {
        const url = document.getElementById('fileUrl').value.trim();
        const title = document.getElementById('fileTitle').value.trim();
        const desc = document.getElementById('fileDesc').value.trim();
        const image = document.getElementById('fileImage').value.trim();
        const vt = document.getElementById('fileVT').value.trim();

        if (!url || !title || !desc) {
            alert('Completa Archivo, Título y Descripción.');
            return;
        }

        const fileData = {
            url, title, desc, image, vt,
            category: category,
            draft: false,
        };
        addFile(fileData);
        document.getElementById('uploadOptions').style.display = 'none';
        // Limpiar campos
        document.getElementById('fileUrl').value = '';
        document.getElementById('fileTitle').value = '';
        document.getElementById('fileDesc').value = '';
        document.getElementById('fileImage').value = '';
        document.getElementById('fileVT').value = '';
        alert('Archivo subido correctamente a ' + category.toUpperCase());
        renderAllFiles();
    }

    function saveDraft() {
        const url = document.getElementById('fileUrl').value.trim();
        const title = document.getElementById('fileTitle').value.trim();
        const desc = document.getElementById('fileDesc').value.trim();
        const image = document.getElementById('fileImage').value.trim();
        const vt = document.getElementById('fileVT').value.trim();

        if (!url || !title || !desc) {
            alert('Completa Archivo, Título y Descripción.');
            return;
        }

        const fileData = {
            url, title, desc, image, vt,
            category: 'borrador',
            draft: true,
        };
        addFile(fileData);
        document.getElementById('fileUrl').value = '';
        document.getElementById('fileTitle').value = '';
        document.getElementById('fileDesc').value = '';
        document.getElementById('fileImage').value = '';
        document.getElementById('fileVT').value = '';
        alert('Borrador guardado.');
        renderAllFiles();
    }

    function publishDraft(id) {
        const files = getFiles();
        const index = files.findIndex(f => f.id === id);
        if (index !== -1) {
            files[index].draft = false;
            files[index].category = 'gratis'; // Por defecto público
            saveFiles(files);
            renderAllFiles();
            alert('Borrador publicado en la categoría Gratis.');
        }
    }

    function deleteFile(id) {
        if (!confirm('¿Eliminar este archivo?')) return;
        let files = getFiles();
        files = files.filter(f => f.id !== id);
        saveFiles(files);
        renderAllFiles();
    }

    // =============================================
    //  DESBLOQUEAR CATEGORÍAS VIP
    // =============================================
    function getVIPPasswords() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_PASSWORDS)) || {};
        } catch { return {}; }
    }

    function saveVIPPasswords(pwds) {
        localStorage.setItem(STORAGE_PASSWORDS, JSON.stringify(pwds));
    }

    function unlockCategory(cat) {
        const inputId = cat === 'vip' ? 'vipPass' : cat === 'supervip' ? 'superVipPass' : 'megaVipPass';
        const input = document.getElementById(inputId);
        const pass = input.value.trim();
        if (!pass) return alert('Introduce la contraseña.');

        const passwords = getVIPPasswords();
        const stored = passwords[cat];
        if (stored && stored === pass) {
            unlocked[cat] = true;
            alert('Categoría desbloqueada.');
            renderAllFiles();
        } else {
            alert('Contraseña incorrecta.');
        }
    }

    // =============================================
    //  GENERAR CONTRASEÑA VIP (solo admin)
    // =============================================
    function showGeneratePassword() {
        if (currentUser !== ADMIN_USER) {
            alert('Solo el administrador puede generar contraseñas.');
            return;
        }
        document.getElementById('passwordModal').classList.add('show');
        document.getElementById('genPasswordDisplay').value = '';
        document.getElementById('genUserDC').value = '';
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
    }

    function generateRandomPassword() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
        let pass = '';
        for (let i = 0; i < 12; i++) {
            pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById('genPasswordDisplay').value = pass;
    }

    function copyPassword() {
        const input = document.getElementById('genPasswordDisplay');
        if (!input.value) return alert('Genera una contraseña primero.');
        navigator.clipboard.writeText(input.value).then(() => {
            alert('Contraseña copiada al portapapeles.');
        }).catch(() => {
            input.select();
            document.execCommand('copy');
            alert('Contraseña copiada.');
        });
    }

    function saveGeneratedPassword() {
        const category = document.getElementById('genCategory').value;
        const userDC = document.getElementById('genUserDC').value.trim();
        const password = document.getElementById('genPasswordDisplay').value.trim();
        if (!userDC || !password) return alert('Completa todos los campos.');

        const passwords = getVIPPasswords();
        // Guardamos con clave: category_user
        const key = category + '_' + userDC;
        passwords[key] = password;
        // También guardamos la contraseña general para la categoría (para desbloquear)
        // Usamos la última generada como contraseña maestra de la categoría
        passwords[category] = password;
        saveVIPPasswords(passwords);
        alert(`Contraseña para ${category.toUpperCase()} - ${userDC} guardada.`);
        closeModal('passwordModal');
        renderAllFiles();
    }

    // =============================================
    //  TABS
    // =============================================
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        // Re-renderizar para refrescar
        renderAllFiles();
    }

    // =============================================
    //  MARKDOWN SIMPLE
    // =============================================
    function markdownToHTML(text) {
        if (!text) return '';
        let html = text;
        // Negrita
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Cursiva
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        // Código inline
        html = html.replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">$1</code>');
        // Saltos de línea
        html = html.replace(/\n/g, '<br />');
        return html;
    }

    // =============================================
    //  CERRAR MODAL CLICK EXTERNO
    // =============================================
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('show');
            }
        });
    });

    console.log('🌙 Lunatic Community cargada correctamente.');
</script>
</body>
</html>
